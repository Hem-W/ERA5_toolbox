# ERA5 Download Configuration
# Copy this file and customize for your needs.
# Usage: python -u downloader_ERA5.py --file <this_file.yaml>

# Year range to download (both start and stop are inclusive)
years:
  start: 2018
  stop: 2020
# OR list individual years:
# years: [2018, 2019, 2020]

# Variables to download (CDS API names)
variables:
  - surface_pressure

# Dataset name
# Options: reanalysis-era5-single-levels, reanalysis-era5-pressure-levels
dataset: reanalysis-era5-single-levels

# Pressure levels in hPa (only for reanalysis-era5-pressure-levels)
# pressure_levels: [500, 850]
pressure_levels: null

# Path to API keys JSON file (null = default 'cdsapi_keys.json')
api_keys_file: null

# Number of concurrent request threads per key
# Each thread submits one retrieve() at a time, so N threads keep
# N requests queued on the CDS server simultaneously.
concurrent_requests: 4

# Number of parallel download threads per key
download_workers: 1

# Whether to skip downloading existing files (requires short_names)
skip_existing: true

# Map of API variable name to short name for filenames
# Recommended when skip_existing is true
short_names:
  surface_pressure: sp

# Output path patterns (optional)
# Supported placeholders in both folder_pattern and name_pattern:
#   {short_name}     - variable short name (falls back to the API variable
#                      name when no short_name is set for the variable)
#   {variable}       - API variable name (e.g. surface_pressure)
#   {year}           - year being downloaded
#   {pressure_level} - pressure level in hPa (empty for single-level dataset)
#   {dataset}        - CDS dataset name
#
# Defaults (applied when a pattern is omitted):
#   folder_pattern: hour/{short_name}
#   name_pattern (single-level):
#     era5.reanalysis.{short_name}.1hr.0p25deg.global.{year}.nc
#   name_pattern (pressure-level):
#     era5.reanalysis.{short_name}.{pressure_level}hpa.1hr.0p25deg.global.{year}.nc
# folder_pattern: hour/{short_name}
# name_pattern: era5.reanalysis.{short_name}.1hr.0p25deg.global.{year}.nc
